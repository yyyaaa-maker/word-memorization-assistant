<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医学词汇背词工具</title>
    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .swipe-hint {
            font-size: 12px;
            color: #6c757d;
            margin-left: 10px;
            display: none;
        }
        
        @media (max-width: 768px) {
            .swipe-hint {
                display: inline-block;
            }
        }
        
        .control-group label {
            font-weight: 600;
            color: #495057;
            min-width: 80px;
        }
        
        .control-group input, .control-group select {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-info {
            background: #17a2b8;
            color: white;
        }
        
        .btn-info:hover {
            background: #138496;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        
        .btn-warning:hover {
            background: #e0a800;
        }
        
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            touch-action: pan-y;
        }
        
        .word-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .word-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .word-card.known {
            background: #d4edda;
            border-color: #28a745;
        }
        
        .word-card.unknown {
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .word-card.current {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .word-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .word-actions {
            display: flex;
            gap: 5px;
        }
        
        .icon-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .icon-btn.known {
            background: #28a745;
            color: white;
        }
        
        .icon-btn.unknown {
            background: #dc3545;
            color: white;
        }
        
        .word-content h3 {
            color: #343a40;
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .word-content p {
            color: #6c757d;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .word-content .english {
            font-style: italic;
            color: #667eea;
            font-weight: 600;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            padding: 15px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }
        
        .pagination .btn {
            font-size: 12px;
            padding: 8px 12px;
            margin: 2px;
        }
        
        .pagination input {
            width: 50px;
            margin: 0 3px;
        }
        
        .pagination .page-info {
            font-size: 12px;
            margin: 0 5px;
        }
        
        .page-info {
            color: #6c757d;
            font-size: 14px;
        }
        
        .stats {
            background: #e3f2fd;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        
        .stat-item h4 {
            color: #1976d2;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .stat-item p {
            color: #6c757d;
            font-size: 12px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .file-label:hover {
            background: #218838;
        }
        
        @media (max-width: 768px) {
            .word-grid {
                grid-template-columns: 1fr;
            }
            
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 医学词汇背词工具</h1>
            <p>高效记忆医学专业词汇</p>
        </div>
        
        <div class="controls">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('learning')">学习模式</div>
                <div class="tab" onclick="switchTab('review')">复习模式</div>
                <div class="tab" onclick="switchTab('settings')">设置</div>
            </div>
        </div>
        
        <div id="learning-tab" class="tab-content active">
            <div class="controls">
                <div class="control-group">
                    <label>当前文件:</label>
                    <select id="fileSelector" onchange="switchToFile(this.value)">
                        <option value="">请选择或导入文件</option>
                    </select>
                    <button class="btn btn-info" onclick="createNewVocabulary()" style="margin-left: 10px;">+ 新建空白词库</button>
                    <button class="btn btn-danger" onclick="deleteCurrentFile()" style="margin-left: 5px;">删除当前文件</button>
                </div>
                
                <div class="control-group">
                    <label for="fileInput" class="file-label">📁 导入Excel文件</label>
                    <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
                    <span id="fileName" style="color: #6c757d; font-size: 14px;">未选择文件</span>
                </div>
                
                <div class="control-group">
                    <label>每页显示:</label>
                    <input type="number" id="wordsPerPage" value="10" min="1" max="50">
                    <button class="btn btn-primary" onclick="updatePagination()">应用</button>
                    <button class="btn btn-danger" onclick="resetProgress()">重置进度</button>
                    <span class="swipe-hint">💡 提示：可以左右滑动翻页</span>
                </div>
                
                <div class="control-group">
                    <label>显示模式:</label>
                    <select id="displayMode" onchange="updateDisplay()">
                        <option value="all">全部显示</option>
                        <option value="unknown">仅显示不会</option>
                        <option value="known">仅显示已会</option>
                    </select>
                    <button class="btn btn-success" onclick="exportUnknown()">导出不会词汇</button>
                    <button class="btn btn-warning" onclick="jumpToFirstUnknown()" style="margin-left: 10px;">跳转到第一个未标记</button>
                </div>
            </div>
            
            <div class="stats" id="stats">
                <div class="stat-item">
                    <h4 id="totalCount">0</h4>
                    <p>总词汇</p>
                </div>
                <div class="stat-item">
                    <h4 id="knownCount">0</h4>
                    <p>已掌握</p>
                </div>
                <div class="stat-item">
                    <h4 id="unknownCount">0</h4>
                    <p>未掌握</p>
                </div>
                <div class="stat-item">
                    <h4 id="progressPercent">0%</h4>
                    <p>掌握率</p>
                </div>
            </div>
            
            <div id="wordContainer" class="word-grid">
            </div>
            
            <div class="pagination" id="pagination">
                <button class="btn btn-primary" onclick="previousPage()">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button class="btn btn-primary" onclick="nextPage()">下一页</button>
                <input type="number" id="pageJump" min="1" style="width: 60px; margin-left: 10px;">
                <button class="btn btn-primary" onclick="jumpToPage()" style="margin-left: 5px;">跳转</button>
                <button class="btn btn-success" onclick="markPageAllKnown()" style="margin-left: 10px;">本页全部掌握</button>
                <button class="btn btn-danger" onclick="resetPageStatus()" style="margin-left: 5px;">重置本页掌握状态</button>
                <button class="btn btn-info" onclick="markPageRestKnown()" style="margin-left: 5px;">本页其余已掌握</button>
            </div>
        </div>
        
        <div id="review-tab" class="tab-content">
            <div class="controls">
                <div class="control-group">
            <label>复习模式:</label>
            <select id="reviewMode" onchange="updateReviewDisplay()">
                <option value="english">隐藏中文，只显示英文</option>
                <option value="chinese">隐藏英文，只显示中文</option>
                <option value="both">全部显示</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>批量操作:</label>
            <button class="btn btn-success" onclick="markReviewPageAllKnown()">本页全部掌握</button>
            <button class="btn btn-info" onclick="markReviewPageRestKnown()">本页其余已掌握</button>
        </div>
        
        <div class="control-group">
            <label>每页显示:</label>
            <input type="number" id="reviewWordsPerPage" value="10" min="1" max="50">
            <button class="btn btn-primary" onclick="updateReviewPagination()">应用</button>
        </div>
            </div>
            
            <div id="reviewWordContainer" class="word-grid">
            </div>
            
            <div class="pagination" id="reviewPagination">
                <button class="btn btn-primary" onclick="previousReviewPage()">上一页</button>
                <span class="page-info" id="reviewPageInfo">第 1 页</span>
                <button class="btn btn-primary" onclick="nextReviewPage()">下一页</button>
                <input type="number" id="reviewPageJump" min="1" style="width: 60px; margin-left: 10px;">
                <button class="btn btn-primary" onclick="jumpToReviewPage()" style="margin-left: 5px;">跳转</button>
            </div>
        </div>
        
        <div id="settings-tab" class="tab-content">
            <div class="controls">
                <h2 style="margin-bottom: 20px;">设置</h2>
                <div class="control-group">
                    <label>默认每页显示:</label>
                    <input type="number" id="defaultWordsPerPage" value="10" min="1" max="50">
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
                
                <div class="control-group">
                    <label>翻页设置:</label>
                    <label style="min-width: auto; font-weight: normal;">
                        <input type="checkbox" id="autoScrollToFirst" style="margin-right: 8px;" onchange="toggleAutoScroll()">
                        下一页时自动定位到第一个单词
                    </label>
                </div>
                
                <div class="control-group">
                    <label>滑动设置:</label>
                    <label style="min-width: auto; font-weight: normal;">
                        <input type="checkbox" id="enableSwipe" style="margin-right: 8px;" onchange="toggleSwipe()">
                        启用左右滑动翻页
                    </label>
                </div>
                
                <div class="control-group">
                    <label>数据管理:</label>
                    <button class="btn btn-danger" onclick="clearAllData()">清除所有数据</button>
                    <button class="btn btn-success" onclick="exportData()">导出学习进度</button>
                    <button class="btn btn-primary" onclick="importData()">导入学习进度</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let db = null;
        let allWords = [];
        let currentPage = 1;
        let wordsPerPage = 10;
        let wordStatus = {};
        let currentDisplayMode = 'all';
        let currentReviewPage = 1;
        let reviewWordsPerPage = 10;
        let currentReviewMode = 'english';
        
        let shownAnswers = new Set();
        
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;
        const minSwipeDistance = 50;
        const maxVerticalDistance = 100;
        
        let autoScrollToFirst = false;
        let enableSwipe = false;
        
        let currentFileId = null;
        let fileList = [];
        
        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const DB_NAME = 'MedicalVocabDB';
                const DB_VERSION = 7;
                
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = (event) => {
                    console.error('IndexedDB打开失败:', event.target.error);
                    reject(event.target.error);
                };
                
                request.onsuccess = (event) => {
                    db = event.target.result;
                    console.log('IndexedDB打开成功，版本:', db.version);
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    const oldVersion = event.oldVersion;
                    console.log(`数据库升级: ${oldVersion} -> ${DB_VERSION}`);
                    
                    if (!database.objectStoreNames.contains('files')) {
                        database.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
                        console.log('创建 files 表');
                    }
                    
                    if (!database.objectStoreNames.contains('vocabulary')) {
                        const vocabStore = database.createObjectStore('vocabulary', { keyPath: 'id' });
                        vocabStore.createIndex('fileId', 'fileId', { unique: false });
                        console.log('创建 vocabulary 表');
                    }
                    
                    if (!database.objectStoreNames.contains('learningStatus')) {
                        const statusStore = database.createObjectStore('learningStatus', { keyPath: 'id', autoIncrement: true });
                        statusStore.createIndex('fileId', 'fileId', { unique: false });
                        statusStore.createIndex('wordId', 'wordId', { unique: false });
                        console.log('创建 learningStatus 表');
                    }
                    
                    if (!database.objectStoreNames.contains('settings')) {
                        database.createObjectStore('settings', { keyPath: 'id' });
                        console.log('创建 settings 表');
                    }
                    
                    console.log('数据库结构升级完成');
                };
                
                request.onblocked = (event) => {
                    console.warn('数据库被阻塞，请关闭其他标签页');
                    alert('数据库正在被其他页面使用，请关闭其他使用该应用的标签页后刷新');
                };
            });
        }
        
        async function getFileList() {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        async function saveFileInfo(fileName) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readwrite');
                const store = transaction.objectStore('files');
                const fileInfo = {
                    fileName: fileName,
                    importTime: new Date().toISOString(),
                    wordCount: 0
                };
                const request = store.add(fileInfo);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        async function updateFileWordCount(fileId, count) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readwrite');
                const store = transaction.objectStore('files');
                const getRequest = store.get(fileId);
                getRequest.onsuccess = () => {
                    const file = getRequest.result;
                    if (file) {
                        file.wordCount = count;
                        store.put(file);
                    }
                    resolve();
                };
                getRequest.onerror = () => reject(getRequest.error);
            });
        }
        
        async function deleteFileData(fileId) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['files', 'vocabulary', 'learningStatus'], 'readwrite');
                
                const filesStore = transaction.objectStore('files');
                filesStore.delete(fileId);
                
                const vocabStore = transaction.objectStore('vocabulary');
                const vocabIndex = vocabStore.index('fileId');
                const vocabRequest = vocabIndex.getAllKeys(fileId);
                vocabRequest.onsuccess = () => {
                    vocabRequest.result.forEach(key => vocabStore.delete(key));
                };
                
                const statusStore = transaction.objectStore('learningStatus');
                const statusIndex = statusStore.index('fileId');
                const statusRequest = statusIndex.getAllKeys(fileId);
                statusRequest.onsuccess = () => {
                    statusRequest.result.forEach(key => statusStore.delete(key));
                };
                
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
        }
        
        async function loadVocabularyFromFile(fileId) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['vocabulary', 'learningStatus'], 'readonly');
                const vocabStore = transaction.objectStore('vocabulary');
                const vocabIndex = vocabStore.index('fileId');
                const vocabRequest = vocabIndex.getAll(fileId);
                
                vocabRequest.onsuccess = () => {
                    const rawWords = vocabRequest.result;
                    if (rawWords.length === 0) {
                        resolve({ words: [], status: {} });
                        return;
                    }
                    
                    const words = rawWords.map(word => ({
                        id: word.originalId !== undefined ? word.originalId : word.id,
                        chinese: word.chinese,
                        english: word.english,
                        category: word.category
                    })).sort((a, b) => a.id - b.id);
                    
                    const statusStore = transaction.objectStore('learningStatus');
                    const statusIndex = statusStore.index('fileId');
                    const statusRequest = statusIndex.getAll(fileId);
                    
                    statusRequest.onsuccess = () => {
                        const status = {};
                        statusRequest.result.forEach(item => {
                            status[item.wordId] = item.status;
                        });
                        resolve({ words: words, status: status });
                    };
                    statusRequest.onerror = () => resolve({ words: words, status: {} });
                };
                vocabRequest.onerror = () => reject(vocabRequest.error);
            });
        }
        
        async function saveVocabularyToDB(fileId, words, status) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['vocabulary', 'learningStatus'], 'readwrite');
                const vocabStore = transaction.objectStore('vocabulary');
                const statusStore = transaction.objectStore('learningStatus');
                
                const vocabIndex = vocabStore.index('fileId');
                const vocabRequest = vocabIndex.getAllKeys(fileId);
                vocabRequest.onsuccess = () => {
                    vocabRequest.result.forEach(key => {
                        vocabStore.delete(key);
                    });
                    
                    const idOffset = parseInt(fileId) * 100000;
                    
                    words.forEach(word => {
                        const uniqueWord = {
                            ...word,
                            id: idOffset + word.id,
                            originalId: word.id,
                            fileId: fileId
                        };
                        vocabStore.put(uniqueWord);
                    });
                    
                    const statusIndex = statusStore.index('fileId');
                    const statusRequest = statusIndex.getAllKeys(fileId);
                    statusRequest.onsuccess = () => {
                        statusRequest.result.forEach(key => {
                            statusStore.delete(key);
                        });
                        
                        Object.entries(status).forEach(([wordId, stat]) => {
                            if (stat !== null && stat !== undefined) {
                                statusStore.put({
                                    fileId: fileId,
                                    wordId: parseInt(wordId),
                                    uniqueWordId: idOffset + parseInt(wordId),
                                    status: stat
                                });
                            }
                        });
                        
                        updateFileWordCount(fileId, words.length);
                        resolve();
                    };
                    statusRequest.onerror = () => reject(statusRequest.error);
                };
                vocabRequest.onerror = () => reject(vocabRequest.error);
            });
        }
        
        function switchTab(tabName) {
            try {
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach(tab => tab.classList.remove('active'));
                
                const tabContents = document.querySelectorAll('.tab-content');
                tabContents.forEach(content => content.classList.remove('active'));
                
                if (tabName === 'learning') {
                    if (tabs[0]) tabs[0].classList.add('active');
                    const learningTab = document.getElementById('learning-tab');
                    if (learningTab) learningTab.classList.add('active');
                } else if (tabName === 'review') {
                    if (tabs[1]) tabs[1].classList.add('active');
                    const reviewTab = document.getElementById('review-tab');
                    if (reviewTab) reviewTab.classList.add('active');
                    updateReviewDisplay();
                } else if (tabName === 'settings') {
                    if (tabs[2]) tabs[2].classList.add('active');
                    const settingsTab = document.getElementById('settings-tab');
                    if (settingsTab) settingsTab.classList.add('active');
                }

        function handleTouchStart(evt) {
            touchStartX = evt.touches[0].clientX;
            touchStartY = evt.touches[0].clientY;
        }
        
        function handleTouchMove(evt) {
            if (!enableSwipe) {
                return;
            }
            
            if (Math.abs(evt.touches[0].clientY - touchStartY) < Math.abs(evt.touches[0].clientX - touchStartX)) {
                evt.preventDefault();
            }
        }
        
        function handleTouchEnd(evt) {
            if (!enableSwipe) {
                return;
            }
            
            touchEndX = evt.changedTouches[0].clientX;
            touchEndY = evt.changedTouches[0].clientY;
            handleSwipeGesture();
        }
        
        function handleSwipeGesture() {
            if (!enableSwipe) {
                return;
            }
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = Math.abs(touchEndY - touchStartY);
            
            if (Math.abs(deltaX) >= minSwipeDistance && deltaY <= maxVerticalDistance) {
                const activeTab = document.querySelector('.tab-content.active');
                
                if (activeTab && activeTab.id === 'learning-tab') {
                    if (deltaX > 0) {
                        previousPage();
                    } else {
                        nextPage();
                    }
                } else if (activeTab && activeTab.id === 'review-tab') {
                    if (deltaX > 0) {
                        previousReviewPage();
                    } else {
                        nextReviewPage();
                    }
                }
            }
        }

                wordContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
                wordContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
            }
            
            if (reviewWordContainer) {
                reviewWordContainer.addEventListener('touchstart', handleTouchStart, { passive: false });

        }

        async function processCSVData(text, fileId, fileName) {
            const newWords = [];
            const newStatus = {};
            
            const lines = text.split('\n');
            
            let wordIndex = 0;
            
            for (let i = 2; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = parseCSVLine(line);
                if (parts.length >= 3) {
                    const chinese = parts[1] ? String(parts[1]).trim() : '';
                    const english = parts[2] ? String(parts[2]).trim() : '';
                    
                    if (chinese && english && chinese !== '中文' && english !== '英文') {
                        newWords.push({
                            id: wordIndex,
                            chinese: chinese,
                            english: english,
                            category: parts[3] ? String(parts[3]).trim() : '未分类'
                        });
                        newStatus[wordIndex] = null;
                        wordIndex++;
                    }
                }
            }
            
            allWords = newWords;
            wordStatus = newStatus;
            currentPage = 1;
            currentReviewPage = 1;
            
            await saveVocabularyToDB(fileId, allWords, wordStatus);
            
            updateDisplay();
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab && activeTab.id === 'review-tab') {
                updateReviewDisplay();
            }
            updateStats();
        }
        
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            
            result.push(current);
            return result;
        }

            `;
            
            return card;
        }
        
        async function showAnswer(wordId, type) {
            const answerDiv = document.getElementById(`answer-${wordId}`);
            if (answerDiv) {
                const isCurrentlyShown = shownAnswers.has(wordId);
                
                if (isCurrentlyShown) {
                    answerDiv.style.display = 'none';
                    shownAnswers.delete(wordId);
                } else {
                    answerDiv.style.display = 'block';
                    shownAnswers.add(wordId);
                    
                    if (wordStatus[wordId] !== 'unknown') {
                        wordStatus[wordId] = 'unknown';
                        updateReviewDisplay();
                        updateStats();
                        await saveCurrentProgress();
                    }
                }
            }
        }
        
        function updateReviewPagination() {
            reviewWordsPerPage = parseInt(document.getElementById('reviewWordsPerPage').value);
            const totalPages = Math.ceil(allWords.length / reviewWordsPerPage);
            
            document.getElementById('reviewPageInfo').textContent = `第 ${currentReviewPage} 页 / 共 ${totalPages} 页`;
            document.getElementById('reviewPageJump').max = totalPages;
            
            if (currentReviewPage > totalPages && totalPages > 0) {
                currentReviewPage = totalPages;
                updateReviewDisplay();
            }
        }
        
        function previousReviewPage() {
            if (currentReviewPage > 1) {
                currentReviewPage--;
                updateReviewDisplay();
            }
        }
        
        function nextReviewPage() {
            const totalPages = Math.ceil(allWords.length / reviewWordsPerPage);
            if (currentReviewPage < totalPages) {
                currentReviewPage++;
                updateReviewDisplay();
            }
        }
        
        function jumpToReviewPage() {
            const targetPage = parseInt(document.getElementById('reviewPageJump').value);
            const totalPages = Math.ceil(allWords.length / reviewWordsPerPage);
            
            if (targetPage >= 1 && targetPage <= totalPages) {
                currentReviewPage = targetPage;
                updateReviewDisplay();
            } else {
                alert('页码超出范围！');
            }
        }
        
        function updateStats() {
            const total = allWords.length;
            const known = Object.values(wordStatus).filter(status => status === 'known').length;
            const unknown = Object.values(wordStatus).filter(status => status === 'unknown').length;
            const percentage = total > 0 ? Math.round((known / total) * 100) : 0;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('knownCount').textContent = known;
            document.getElementById('unknownCount').textContent = unknown;
            document.getElementById('progressPercent').textContent = percentage + '%';
        }
        
        async function resetProgress() {
            if (confirm('确定要重置当前文件的所有学习进度吗？')) {
                if (!currentFileId) {
                    alert('请先选择一个文件');
                    return;
                }
                
                wordStatus = {};
                shownAnswers.clear();
                currentPage = 1;
                currentReviewPage = 1;
                updateDisplay();
                updateStats();
                
                await saveVocabularyToDB(currentFileId, allWords, wordStatus);
            }
        }
        
        function exportUnknown() {
            const unknownWords = allWords.filter(word => wordStatus[word.id] === 'unknown');
            if (unknownWords.length === 0) {
                alert('没有未掌握的词汇！');
                return;
            }
            
            let lastLearnedIndex = -1;
            for (let i = 0; i < allWords.length; i++) {
                if (wordStatus[allWords[i].id] === 'known' || wordStatus[allWords[i].id] === 'unknown') {
                    lastLearnedIndex = i;
                }
            }
            
            if (lastLearnedIndex === -1) {
                lastLearnedIndex = 0;
            }
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timestamp = `${year}${month}${day}_${hours}${minutes}${seconds}`;
            const range = `1-${lastLearnedIndex + 1}`;
            const filename = `未掌握词汇_${range}_${timestamp}.csv`;
            
            const exportTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            const progressName = `词汇进度: 1-${lastLearnedIndex + 1}`;
            let csvContent = `"导出时间: ${exportTime}","${progressName}"\n`;
            
            csvContent += "序号,中文,英文,分类\n";
            
            unknownWords.forEach(word => {
                const index = allWords.findIndex(w => w.id === word.id) + 1;
                csvContent += `${index},"${word.chinese}","${word.english}","${word.category}"\n`;
            });
            
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function saveSettings() {
            const defaultWordsPerPage = document.getElementById('defaultWordsPerPage').value;
            localStorage.setItem('defaultWordsPerPage', defaultWordsPerPage);
            wordsPerPage = parseInt(defaultWordsPerPage);
            reviewWordsPerPage = parseInt(defaultWordsPerPage);
            document.getElementById('wordsPerPage').value = defaultWordsPerPage;
            document.getElementById('reviewWordsPerPage').value = defaultWordsPerPage;
            
            autoScrollToFirst = document.getElementById('autoScrollToFirst').checked;
            localStorage.setItem('autoScrollToFirst', String(autoScrollToFirst));
            
            enableSwipe = document.getElementById('enableSwipe').checked;
            localStorage.setItem('enableSwipe', String(enableSwipe));
            
            document.getElementById('autoScrollToFirst').checked = autoScrollToFirst;
            document.getElementById('enableSwipe').checked = enableSwipe;
            
            console.log('设置已保存:', { 
                autoScrollToFirst, 
                enableSwipe,
                checkboxStates: {
                    autoScroll: document.getElementById('autoScrollToFirst').checked,
                    swipe: document.getElementById('enableSwipe').checked
                }
            });
            
            updateDisplay();
            updateReviewDisplay();
            alert('设置已保存！');
        }
        
        function toggleAutoScroll() {
            autoScrollToFirst = document.getElementById('autoScrollToFirst').checked;
            localStorage.setItem('autoScrollToFirst', String(autoScrollToFirst));
            console.log('autoScrollToFirst 已切换为:', autoScrollToFirst);
        }
        
        function toggleSwipe() {
            enableSwipe = document.getElementById('enableSwipe').checked;
            localStorage.setItem('enableSwipe', String(enableSwipe));
            console.log('enableSwipe 已切换为:', enableSwipe);
        }
        
        async function clearAllData() {
            if (confirm('确定要清除所有文件的数据吗？此操作不可恢复！')) {
                try {
                    const files = await getFileList();
                    for (const file of files) {
                        await deleteFileData(file.id);
                    }
                    
                    currentFileId = null;
                    allWords = [];
                    wordStatus = {};
                    shownAnswers.clear();
                    currentPage = 1;
                    currentReviewPage = 1;
                    
                    await refreshFileList();
                    updateDisplay();
                    updateStats();
                    updateReviewDisplay();
                    
                    alert('所有数据已清除！');
                } catch (error) {
                    console.error('清除数据错误:', error);
                    alert('清除数据失败');
                }
            }
        }
        
        async function exportData() {
            if (!currentFileId) {
                alert('请先选择一个文件');
                return;
            }
            
            const currentFile = fileList.find(f => f.id === currentFileId);
            
            const data = {
                fileId: currentFileId,
                fileName: currentFile ? currentFile.fileName : 'unknown',
                allWords: allWords,
                wordStatus: wordStatus,
                exportTime: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(data);
            const blob = new Blob([dataStr], { type: 'application/json' });
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timestamp = `${year}${month}${day}_${hours}${minutes}${seconds}`;
            const safeFileName = (currentFile ? currentFile.fileName : 'data').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
            const filename = `${safeFileName}_学习进度_${timestamp}.json`;
            
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function importData() {
            if (!currentFileId) {
                const shouldCreate = confirm('当前未选择词库。\n\n是否要先创建一个新的空白词库？\n\n点击"确定"创建新词库，\n点击"取消"返回选择已有词库。');
                
                if (shouldCreate) {
                    createNewVocabulary();
                }
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = async function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            
                            if (!data.allWords || !data.wordStatus) {
                                throw new Error('无效的数据格式');
                            }
                            
                            allWords = data.allWords || [];
                            wordStatus = data.wordStatus || {};
                            currentPage = 1;
                            currentReviewPage = 1;
                            
                            await saveVocabularyToDB(currentFileId, allWords, wordStatus);
                            
                            updateDisplay();
                            updateStats();
                            updateReviewDisplay();
                            await refreshFileList();
                            
                            alert(`学习进度导入成功！\n导入自: ${data.fileName || '未知文件'}\n导出时间: ${data.exportTime ? new Date(data.exportTime).toLocaleString() : '未知'}`);
                        } catch (error) {
                            console.error('导入错误:', error);
                            alert('导入失败，请检查文件格式！');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            
            input.click();
        }
        
        async function migrateOldData() {
            if (!db) return;
            
            try {
                const transaction = db.transaction(['vocabulary', 'files'], 'readonly');
                const vocabStore = transaction.objectStore('vocabulary');
                const filesStore = transaction.objectStore('files');
                
                const filesRequest = filesStore.getAll();
                
                filesRequest.onsuccess = async () => {
                    const files = filesRequest.result;
                    
                    const vocabRequest = vocabStore.getAll();
                    vocabRequest.onsuccess = () => {
                        const allVocab = vocabRequest.result;
                        
                        const needsMigration = allVocab.some(word => word.originalId === undefined);
                        
                        if (needsMigration && allVocab.length > 0) {
                            console.log('检测到旧格式数据，开始迁移...');
                            
                            const groupedByFile = {};
                            allVocab.forEach(word => {
                                const fid = word.fileId;
                                if (!groupedByFile[fid]) {
                                    groupedByFile[fid] = [];
                                }
                                groupedByFile[fid].push(word);
                            });
                            
                            Object.keys(groupedByFile).forEach(async (fileId) => {
                                const words = groupedByFile[fileId];
                                
                                const idOffset = parseInt(fileId) * 100000;
                                const migratedWords = words.map(word => ({
                                    ...word,
                                    id: idOffset + word.id,
                                    originalId: word.id
                                }));
                                
                                const writeTx = db.transaction(['vocabulary'], 'readwrite');
                                const writeStore = writeTx.objectStore('vocabulary');
                                
                                migratedWords.forEach(word => {
                                    writeStore.put(word);
                                });
                            });
                            
                            console.log('数据迁移完成！');
                        } else {
                            console.log('数据已是最新格式，无需迁移');
                        }
                    };
                };
            } catch (error) {
                console.error('数据迁移失败:', error);
            }
        }
        
        window.onload = async function() {
            try {
                if (!window.indexedDB) {
                    console.warn('浏览器不支持IndexedDB，将使用localStorage作为备选');
                    alert('您的浏览器不支持IndexedDB，部分功能可能受限。建议使用Chrome、Edge或Firefox浏览器。');
                }
                
                if (window.indexedDB) {
                    try {
                        await initIndexedDB();
                        console.log('IndexedDB初始化成功');
                        
                        await migrateOldData();
                    } catch (dbError) {
                        console.error('IndexedDB初始化失败:', dbError);
                        alert('数据库初始化失败: ' + dbError.message);
                    }
                }
                
                const savedWordsPerPage = localStorage.getItem('defaultWordsPerPage');
                if (savedWordsPerPage) {
                    const wordsPerPageInput = document.getElementById('defaultWordsPerPage');
                    const wordsInput = document.getElementById('wordsPerPage');
                    const reviewInput = document.getElementById('reviewWordsPerPage');
                    
                    if (wordsPerPageInput) wordsPerPageInput.value = savedWordsPerPage;
                    if (wordsInput) wordsInput.value = savedWordsPerPage;
                    if (reviewInput) reviewInput.value = savedWordsPerPage;
                    wordsPerPage = parseInt(savedWordsPerPage) || 10;
                    reviewWordsPerPage = parseInt(savedWordsPerPage) || 10;
                }
                
                const savedAutoScrollToFirst = localStorage.getItem('autoScrollToFirst');
                if (savedAutoScrollToFirst !== null) {
                    autoScrollToFirst = savedAutoScrollToFirst === 'true';
                    const autoScrollCheckbox = document.getElementById('autoScrollToFirst');
                    if (autoScrollCheckbox) autoScrollCheckbox.checked = autoScrollToFirst;
                }
                
                const savedEnableSwipe = localStorage.getItem('enableSwipe');
                if (savedEnableSwipe !== null) {
                    enableSwipe = savedEnableSwipe === 'true';
                    const swipeCheckbox = document.getElementById('enableSwipe');
                    if (swipeCheckbox) swipeCheckbox.checked = enableSwipe;
                }
                
                initTouchEvents();
                
                if (window.indexedDB && db) {
                    try {
                        await refreshFileList();
                        const hasLoadedData = await loadWordsFromStorage();
                        
                        if (!hasLoadedData) {
                            allWords = [];
                            wordStatus = {};
                            updateDisplay();
                            updateStats();
                        }
                    } catch (dataError) {
                        console.error('加载数据失败:', dataError);
                        allWords = [];
                        wordStatus = {};
                        updateDisplay();
                        updateStats();
                    }
                } else {
                    allWords = [];
                    wordStatus = {};
                    updateDisplay();
                    updateStats();
                }
                
                console.log('应用初始化完成');
            } catch (error) {
                console.error('初始化错误详情:', error);
                console.error('错误堆栈:', error.stack);
                
                try {
                    allWords = [];
                    wordStatus = {};
                    updateDisplay();
                    updateStats();
                } catch (fallbackError) {
                    console.error('备用初始化也失败:', fallbackError);
                }
                
                if (error.message && !error.message.includes('undefined')) {
                    alert('应用初始化遇到问题: ' + error.message + '\n\n请刷新页面重试，或按F12查看详细错误信息。');
                }
            }
        };
    </script>
