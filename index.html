<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医学词汇背词工具</title>
    <!-- Firebase SDK (仅Auth，无需Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 800px; margin: 0 auto;
            background: white; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .controls {
            padding: 20px; background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .control-group {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 15px; flex-wrap: wrap;
        }
        .swipe-hint {
            font-size: 12px; color: #6c757d; margin-left: 10px;
            display: none;
        }
        @media (max-width: 768px) { .swipe-hint { display: inline-block; } }
        .control-group label { font-weight: 600; color: #495057; min-width: 80px; }
        .control-group input, .control-group select {
            padding: 8px 12px; border: 2px solid #dee2e6;
            border-radius: 8px; font-size: 14px; transition: border-color 0.3s;
        }
        .control-group input:focus, .control-group select:focus {
            outline: none; border-color: #667eea;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd8; transform: translateY(-1px); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-info:hover { background: #138496; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-warning:hover { background: #e0a800; }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
        .tab {
            padding: 15px 25px; cursor: pointer; font-weight: 600;
            color: #6c757d; border-bottom: 3px solid transparent; transition: all 0.3s;
        }
        .tab.active { color: #667eea; border-bottom-color: #667eea; background: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .word-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px; padding: 20px; touch-action: pan-y;
        }
        .word-card {
            background: white; border: 2px solid #e9ecef; border-radius: 12px;
            padding: 20px; transition: all 0.3s; cursor: pointer; position: relative;
        }
        .word-card:hover { border-color: #667eea; box-shadow: 0 5px 15px rgba(102,126,234,0.2); }
        .word-card.known { background: #d4edda; border-color: #28a745; }
        .word-card.unknown { background: #f8d7da; border-color: #dc3545; }
        .word-card.current { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .word-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .word-number {
            background: #667eea; color: white; width: 30px; height: 30px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        .word-actions { display: flex; gap: 5px; }
        .icon-btn {
            width: 30px; height: 30px; border: none; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.3s;
        }
        .icon-btn.known { background: #28a745; color: white; }
        .icon-btn.unknown { background: #dc3545; color: white; }
        .word-content h3 { color: #343a40; margin-bottom: 8px; font-size: 18px; }
        .word-content p { color: #6c757d; margin-bottom: 5px; font-size: 14px; }
        .word-content .english { font-style: italic; color: #667eea; font-weight: 600; }
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 5px; padding: 15px; background: #f8f9fa; flex-wrap: wrap;
        }
        .pagination .btn { font-size: 12px; padding: 8px 12px; margin: 2px; }
        .pagination input { width: 50px; margin: 0 3px; }
        .pagination .page-info { font-size: 12px; margin: 0 5px; }
        .page-info { color: #6c757d; font-size: 14px; }
        .stats {
            background: #e3f2fd; padding: 15px 20px; border-bottom: 1px solid #e9ecef;
            display: flex; justify-content: space-around; text-align: center;
        }
        .stat-item h4 { color: #1976d2; font-size: 24px; margin-bottom: 5px; }
        .stat-item p { color: #6c757d; font-size: 12px; }
        .file-input { display: none; }
        .file-label {
            display: inline-block; padding: 10px 20px; background: #28a745;
            color: white; border-radius: 8px; cursor: pointer; transition: background 0.3s;
        }
        .file-label:hover { background: #218838; }
        @media (max-width: 768px) {
            .word-grid { grid-template-columns: 1fr; }
            .control-group { flex-direction: column; align-items: stretch; }
            .control-group label { min-width: auto; }
        }
        /* 新增GitHub相关样式 */
        #updateList {
            padding:10px; background:#f1f1f1; border-radius:8px; display:none; margin-bottom:10px;
        }
        #updateList div {
            display: flex; justify-content: space-between; align-items: center;
            margin:5px 0; background:white; padding:8px; border-radius:6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 医学词汇背词工具</h1>
            <p id="userStatus">正在加载...</p>
        </div>

        <div class="controls">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('learning')">学习模式</div>
                <div class="tab" onclick="switchTab('review')">复习模式</div>
                <div class="tab" onclick="switchTab('settings')">设置</div>
            </div>
        </div>

        <!-- 学习模式标签页 -->
        <div id="learning-tab" class="tab-content active">
            <div class="controls">
                <div class="control-group">
                    <label>当前文件:</label>
                    <select id="fileSelector" onchange="switchToFile(this.value)">
                        <option value="">请选择或导入文件</option>
                    </select>
                    <button class="btn btn-info" onclick="createNewVocabulary()">+ 新建空白词库</button>
                    <button class="btn btn-danger" onclick="deleteCurrentFile()">删除当前文件</button>
                </div>

                <div class="control-group">
                    <label for="fileInput" class="file-label">📁 导入Excel文件</label>
                    <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
                    <span id="fileName" style="color: #6c757d; font-size: 14px;">未选择文件</span>
                </div>

                <!-- 新增：云端词库更新 -->
                <div class="control-group">
                    <label>云端词库更新:</label>
                    <button class="btn btn-success" onclick="checkUpdates()">🔍 检查更新</button>
                    <span id="updateStatus" style="font-size:14px; color:#6c757d;"></span>
                </div>
                <div id="updateList"></div>

                <div class="control-group">
                    <label>每页显示:</label>
                    <input type="number" id="wordsPerPage" value="10" min="1" max="50">
                    <button class="btn btn-primary" onclick="updatePagination()">应用</button>
                    <button class="btn btn-danger" onclick="resetProgress()">重置进度</button>
                    <span class="swipe-hint">💡 提示：可以左右滑动翻页</span>
                </div>

                <div class="control-group">
                    <label>显示模式:</label>
                    <select id="displayMode" onchange="updateDisplay()">
                        <option value="all">全部显示</option>
                        <option value="unknown">仅显示不会</option>
                        <option value="known">仅显示已会</option>
                    </select>
                    <button class="btn btn-success" onclick="exportUnknown()">导出不会词汇</button>
                    <button class="btn btn-warning" onclick="jumpToFirstUnknown()">跳转到第一个未标记</button>
                </div>
            </div>

            <div class="stats" id="stats">
                <div class="stat-item"><h4 id="totalCount">0</h4><p>总词汇</p></div>
                <div class="stat-item"><h4 id="knownCount">0</h4><p>已掌握</p></div>
                <div class="stat-item"><h4 id="unknownCount">0</h4><p>未掌握</p></div>
                <div class="stat-item"><h4 id="progressPercent">0%</h4><p>掌握率</p></div>
            </div>

            <div id="wordContainer" class="word-grid"></div>

            <div class="pagination" id="pagination">
                <button class="btn btn-primary" onclick="previousPage()">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button class="btn btn-primary" onclick="nextPage()">下一页</button>
                <input type="number" id="pageJump" min="1" style="width:60px; margin-left:10px;">
                <button class="btn btn-primary" onclick="jumpToPage()">跳转</button>
                <button class="btn btn-success" onclick="markPageAllKnown()">本页全部掌握</button>
                <button class="btn btn-danger" onclick="resetPageStatus()">重置本页掌握状态</button>
                <button class="btn btn-info" onclick="markPageRestKnown()">本页其余已掌握</button>
            </div>
        </div>

        <!-- 复习模式标签页 -->
        <div id="review-tab" class="tab-content">
            <div class="controls">
                <div class="control-group">
                    <label>复习模式:</label>
                    <select id="reviewMode" onchange="updateReviewDisplay()">
                        <option value="english">隐藏中文，只显示英文</option>
                        <option value="chinese">隐藏英文，只显示中文</option>
                        <option value="both">全部显示</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>批量操作:</label>
                    <button class="btn btn-success" onclick="markReviewPageAllKnown()">本页全部掌握</button>
                    <button class="btn btn-info" onclick="markReviewPageRestKnown()">本页其余已掌握</button>
                </div>
                <div class="control-group">
                    <label>每页显示:</label>
                    <input type="number" id="reviewWordsPerPage" value="10" min="1" max="50">
                    <button class="btn btn-primary" onclick="updateReviewPagination()">应用</button>
                </div>
            </div>
            <div id="reviewWordContainer" class="word-grid"></div>
            <div class="pagination" id="reviewPagination">
                <button class="btn btn-primary" onclick="previousReviewPage()">上一页</button>
                <span class="page-info" id="reviewPageInfo">第 1 页</span>
                <button class="btn btn-primary" onclick="nextReviewPage()">下一页</button>
                <input type="number" id="reviewPageJump" min="1" style="width:60px; margin-left:10px;">
                <button class="btn btn-primary" onclick="jumpToReviewPage()">跳转</button>
            </div>
        </div>

        <!-- 设置标签页 -->
        <div id="settings-tab" class="tab-content">
            <div class="controls">
                <h2 style="margin-bottom:20px;">设置</h2>
                <div class="control-group">
                    <label>默认每页显示:</label>
                    <input type="number" id="defaultWordsPerPage" value="10" min="1" max="50">
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
                <div class="control-group">
                    <label>翻页设置:</label>
                    <label style="min-width:auto; font-weight:normal;">
                        <input type="checkbox" id="autoScrollToFirst" onchange="toggleAutoScroll()"> 下一页时自动定位到第一个单词
                    </label>
                </div>
                <div class="control-group">
                    <label>滑动设置:</label>
                    <label style="min-width:auto; font-weight:normal;">
                        <input type="checkbox" id="enableSwipe" onchange="toggleSwipe()"> 启用左右滑动翻页
                    </label>
                </div>
                <div class="control-group">
                    <label>数据管理:</label>
                    <button class="btn btn-danger" onclick="clearAllData()">清除所有数据</button>
                    <button class="btn btn-success" onclick="exportData()">导出学习进度</button>
                    <button class="btn btn-primary" onclick="importData()">导入学习进度</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // ==================== Firebase 初始化 ====================
        // ！！！请将下面的配置替换为你自己的 Firebase 配置 ！！！
        const firebaseConfig = {
            apiKey: "AIzaSyxxxxxxxxxxxxxxxxxxxxxxxxxxx",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ==================== GitHub 云端词库配置 ====================
        const GITHUB_OWNER = 'yyyaaa-maker';           // 你的 GitHub 用户名
        const GITHUB_REPO = 'word-memorization-assistant';
        const FOLDER_PATH = 'wordlists';               // xlsx 存放文件夹

        // ==================== 全局变量（原有） ====================
        let db = null;
        let allWords = [];
        let currentPage = 1;
        let wordsPerPage = 10;
        let wordStatus = {};
        let currentDisplayMode = 'all';
        let currentReviewPage = 1;
        let reviewWordsPerPage = 10;
        let currentReviewMode = 'english';
        let shownAnswers = new Set();
        let touchStartX = 0, touchEndX = 0, touchStartY = 0, touchEndY = 0;
        const minSwipeDistance = 50, maxVerticalDistance = 100;
        let autoScrollToFirst = false;
        let enableSwipe = false;
        let currentFileId = null;
        let fileList = [];

        // 已导入的云端文件记录（sha -> 文件信息）
        let importedFiles = {};
        try {
            importedFiles = JSON.parse(localStorage.getItem('importedFiles') || '{}');
        } catch(e) {}

        function saveImportedFiles() {
            localStorage.setItem('importedFiles', JSON.stringify(importedFiles));
        }

        // ==================== 用户登录/UI ====================
        function updateUserUI(user) {
            const statusEl = document.getElementById('userStatus');
            if (user) {
                statusEl.innerHTML = `已登录：${user.displayName || user.email} | <a href="#" onclick="logout()" style="color:white;">退出</a>`;
            } else {
                statusEl.innerHTML = `未登录 | <a href="#" onclick="loginWithGitHub()" style="color:white;">使用 GitHub 登录</a>`;
            }
        }

        auth.onAuthStateChanged(user => {
            updateUserUI(user);
            // 登录时保存 token
            if (user) {
                // 从 credential 获取 token 需要在登录时完成，这里仅更新UI
                // 已在loginWithGitHub中保存
            } else {
                localStorage.removeItem('githubToken');
            }
        });

        function loginWithGitHub() {
            const provider = new firebase.auth.GithubAuthProvider();
            auth.signInWithPopup(provider).then(result => {
                const credential = result.credential;
                if (credential) {
                    localStorage.setItem('githubToken', credential.accessToken);
                }
                updateUserUI(result.user);
            }).catch(error => {
                alert('登录失败：' + error.message);
            });
        }

        function logout() {
            auth.signOut();
            localStorage.removeItem('githubToken');
            updateUserUI(null);
        }

        function getGitHubToken() {
            return localStorage.getItem('githubToken');
        }

        // ==================== IndexedDB 相关（原有） ====================
        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const DB_NAME = 'MedicalVocabDB', DB_VERSION = 7;
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (e) => reject(e.target.error);
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('files')) database.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
                    if (!database.objectStoreNames.contains('vocabulary')) {
                        const vocabStore = database.createObjectStore('vocabulary', { keyPath: 'id' });
                        vocabStore.createIndex('fileId', 'fileId', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('learningStatus')) {
                        const statusStore = database.createObjectStore('learningStatus', { keyPath: 'id', autoIncrement: true });
                        statusStore.createIndex('fileId', 'fileId', { unique: false });
                        statusStore.createIndex('wordId', 'wordId', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'id' });
                };
                request.onblocked = () => alert('数据库被其他页面占用，请关闭其他标签页后刷新');
            });
        }

        async function getFileList() {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['files'], 'readonly');
                const store = tx.objectStore('files');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function saveFileInfo(fileName) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['files'], 'readwrite');
                const store = tx.objectStore('files');
                const req = store.add({ fileName, importTime: new Date().toISOString(), wordCount: 0 });
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function updateFileWordCount(fileId, count) {
            if (!db) await initIndexedDB();
            const tx = db.transaction(['files'], 'readwrite');
            const store = tx.objectStore('files');
            const getReq = store.get(fileId);
            getReq.onsuccess = () => {
                const file = getReq.result;
                if (file) { file.wordCount = count; store.put(file); }
            };
        }

        async function deleteFileData(fileId) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['files', 'vocabulary', 'learningStatus'], 'readwrite');
                tx.objectStore('files').delete(fileId);
                const vocabStore = tx.objectStore('vocabulary');
                const vocabIdx = vocabStore.index('fileId');
                vocabIdx.getAllKeys(fileId).onsuccess = (e) => e.target.result.forEach(k => vocabStore.delete(k));
                const statusStore = tx.objectStore('learningStatus');
                const statusIdx = statusStore.index('fileId');
                statusIdx.getAllKeys(fileId).onsuccess = (e) => e.target.result.forEach(k => statusStore.delete(k));
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function loadVocabularyFromFile(fileId) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['vocabulary', 'learningStatus'], 'readonly');
                const vocabStore = tx.objectStore('vocabulary');
                const vocabIdx = vocabStore.index('fileId');
                vocabIdx.getAll(fileId).onsuccess = (e) => {
                    const rawWords = e.target.result;
                    if (rawWords.length === 0) return resolve({ words: [], status: {} });
                    const words = rawWords.map(w => ({
                        id: w.originalId !== undefined ? w.originalId : w.id,
                        chinese: w.chinese, english: w.english, category: w.category
                    })).sort((a, b) => a.id - b.id);
                    const statusStore = tx.objectStore('learningStatus');
                    const statusIdx = statusStore.index('fileId');
                    statusIdx.getAll(fileId).onsuccess = (ev) => {
                        const status = {};
                        ev.target.result.forEach(item => { status[item.wordId] = item.status; });
                        resolve({ words, status });
                    };
                    statusIdx.getAll(fileId).onerror = () => resolve({ words, status: {} });
                };
                vocabIdx.getAll(fileId).onerror = () => reject(e.target.error);
            });
        }

        async function saveVocabularyToDB(fileId, words, status) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['vocabulary', 'learningStatus'], 'readwrite');
                const vocabStore = tx.objectStore('vocabulary');
                const vocabIdx = vocabStore.index('fileId');
                vocabIdx.getAllKeys(fileId).onsuccess = (e) => {
                    e.target.result.forEach(k => vocabStore.delete(k));
                    const idOffset = parseInt(fileId) * 100000;
                    words.forEach(word => {
                        vocabStore.put({ ...word, id: idOffset + word.id, originalId: word.id, fileId });
                    });
                    const statusStore = tx.objectStore('learningStatus');
                    const statusIdx = statusStore.index('fileId');
                    statusIdx.getAllKeys(fileId).onsuccess = (ev) => {
                        ev.target.result.forEach(k => statusStore.delete(k));
                        Object.entries(status).forEach(([wordId, stat]) => {
                            if (stat !== null && stat !== undefined) {
                                statusStore.put({ fileId, wordId: parseInt(wordId), uniqueWordId: idOffset + parseInt(wordId), status: stat });
                            }
                        });
                        updateFileWordCount(fileId, words.length);
                        resolve();
                    };
                    statusIdx.getAllKeys(fileId).onerror = () => reject(ev.target.error);
                };
                vocabIdx.getAllKeys(fileId).onerror = () => reject(e.target.error);
            });
        }

        async function refreshFileList() {
            fileList = await getFileList();
            const selector = document.getElementById('fileSelector');
            selector.innerHTML = '<option value="">请选择或导入文件</option>';
            fileList.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file.id;
                opt.textContent = `${file.fileName} (${file.wordCount}词)`;
                if (file.id === currentFileId) opt.selected = true;
                selector.appendChild(opt);
            });
        }

        async function switchToFile(fileId) {
            if (!fileId) {
                currentFileId = null; allWords = []; wordStatus = {};
                currentPage = 1; currentReviewPage = 1;
                updateDisplay(); updateReviewDisplay(); updateStats();
                return;
            }
            currentFileId = parseInt(fileId);
            const data = await loadVocabularyFromFile(currentFileId);
            allWords = data.words; wordStatus = data.status;
            currentPage = 1; currentReviewPage = 1;
            updateDisplay(); updateReviewDisplay(); updateStats();
        }

        async function createNewVocabulary() {
            const name = prompt('请输入新词库的名称：', `新词库_${new Date().toLocaleDateString()}`);
            if (!name || !name.trim()) return;
            const vocabularyName = name.trim();
            const fileId = await saveFileInfo(vocabularyName + '.json');
            currentFileId = fileId; allWords = []; wordStatus = {};
            currentPage = 1; currentReviewPage = 1;
            await saveVocabularyToDB(fileId, allWords, wordStatus);

        // ==================== Excel 解析（原有，但稍作调整可复用） ====================
        function parseCSVLine(line) {
            const result = []; let current = '', inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                else current += char;
            }
            result.push(current);
            return result;
        }

        async function processExcelData(data, fileId, fileName) {
            const newWords = [], newStatus = {};
            let wordIndex = 0;
            for (let i = 2; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length === 0) continue;
                const chinese = row[1] ? String(row[1]).trim() : '';
                const english = row[2] ? String(row[2]).trim() : '';
                if (chinese && english && chinese !== '中文' && english !== '英文') {
                    newWords.push({ id: wordIndex, chinese, english, category: row[3] ? String(row[3]).trim() : '未分类' });
                    newStatus[wordIndex] = null;
                    wordIndex++;
                }
            }
            allWords = newWords;
            wordStatus = newStatus;
            currentPage = 1; currentReviewPage = 1;
            await saveVocabularyToDB(fileId, allWords, wordStatus);
            updateDisplay();
            if (document.querySelector('.tab-content.active')?.id === 'review-tab') updateReviewDisplay();
            updateStats();
        }

        async function processCSVData(text, fileId, fileName) {
            const newWords = [], newStatus = {};
            const lines = text.split('\n');
            let wordIndex = 0;
            for (let i = 2; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = parseCSVLine(line);
                if (parts.length >= 3) {
                    const chinese = parts[1]?.trim(), english = parts[2]?.trim();
                    if (chinese && english && chinese !== '中文' && english !== '英文') {
                        newWords.push({ id: wordIndex, chinese, english, category: parts[3] ? parts[3].trim() : '未分类' });
                        newStatus[wordIndex] = null;
                        wordIndex++;
                    }
                }
            }
            allWords = newWords; wordStatus = newStatus;
            currentPage = 1; currentReviewPage = 1;
            await saveVocabularyToDB(currentFileId, allWords, wordStatus);
            updateDisplay();
            if (document.querySelector('.tab-content.active')?.id === 'review-tab') updateReviewDisplay();
            updateStats();
        }

        // 触摸滑动
        function initTouchEvents() {
            const wc = document.getElementById('wordContainer');
            const rwc = document.getElementById('reviewWordContainer');
            const hStart = (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; };
            const hMove = (e) => { if (!enableSwipe) return; if (Math.abs(e.touches[0].clientY - touchStartY) < Math.abs(e.touches[0].clientX - touchStartX)) e.preventDefault(); };
            const hEnd = (e) => {
                if (!enableSwipe) return;
                touchEndX = e.changedTouches[0].clientX; touchEndY = e.changedTouches[0].clientY;
                const dx = touchEndX - touchStartX, dy = Math.abs(touchEndY - touchStartY);
                if (Math.abs(dx) >= minSwipeDistance && dy <= maxVerticalDistance) {
                    if (document.querySelector('.tab-content.active')?.id === 'learning-tab') dx > 0 ? previousPage() : nextPage();
                    else if (document.querySelector('.tab-content.active')?.id === 'review-tab') dx > 0 ? previousReviewPage() : nextReviewPage();
                }
            };
            if (wc) { wc.addEventListener('touchstart', hStart, {passive:false}); wc.addEventListener('touchmove', hMove, {passive:false}); wc.addEventListener('touchend', hEnd, {passive:false}); }
            if (rwc) { rwc.addEventListener('touchstart', hStart, {passive:false}); rwc.addEventListener('touchmove', hMove, {passive:false}); rwc.addEventListener('touchend', hEnd, {passive:false}); }
        }

        // ==================== 云端 GitHub 词库检查与导入 ====================
        async function checkUpdates() {
            const updateStatus = document.getElementById('updateStatus');
            const updateListDiv = document.getElementById('updateList');
            updateStatus.textContent = '正在检查...';
            updateListDiv.style.display = 'none';
            updateListDiv.innerHTML = '';

            const token = getGitHubToken();
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;
                const resp = await fetch(url, { headers });
                if (!resp.ok) throw new Error('无法访问文件夹，请确认仓库公开或登录');
                const files = await resp.json();
                const xlsxFiles = files.filter(f => f.name.endsWith('.xlsx'));
                if (xlsxFiles.length === 0) {
                    updateStatus.textContent = '云端暂无 xlsx 文件';
                    return;
                }
                const newOrUpdated = xlsxFiles.filter(f => {
                    const existing = importedFiles[f.name];
                    return !existing || existing.sha !== f.sha;
                });
                if (newOrUpdated.length === 0) {
                    updateStatus.textContent = '所有词库已是最新 ✨';
                    return;
                }
                updateStatus.textContent = `发现 ${newOrUpdated.length} 个可更新/新词库`;
                let html = '';
                newOrUpdated.forEach(f => {
                    const status = importedFiles[f.name] ? '(更新)' : '(新)';
                    html += `<div>
                        <span>📄 ${f.name} ${status}</span>
                        <button class="btn btn-info" onclick="importGitHubFile('${f.download_url}', '${f.name}', '${f.sha}')">导入</button>
                    </div>`;
                });
                updateListDiv.innerHTML = html;
                updateListDiv.style.display = 'block';
            } catch (err) {
                updateStatus.textContent = '检查失败：' + err.message;
            }
        }

        async function importGitHubFile(downloadUrl, fileName, sha) {
            if (!currentFileId) {
                alert('请先在左侧选择或创建一个词库！');
                return;
            }
            const updateStatus = document.getElementById('updateStatus');
            try {
                updateStatus.textContent = `正在导入 ${fileName} ...`;
                const resp = await fetch(downloadUrl);
                if (!resp.ok) throw new Error('下载失败');
                const arrayBuffer = await resp.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                // 使用当前 fileId 导入
                await processExcelData(jsonData, currentFileId, fileName);
                importedFiles[fileName] = { sha, time: new Date().toISOString() };
                saveImportedFiles();
                await refreshFileList();
                updateStatus.textContent = `✅ "${fileName}" 导入成功！`;
                document.getElementById('updateList').style.display = 'none';
            } catch (err) {
                updateStatus.textContent = '导入失败：' + err.message;
            }
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileName').textContent = file.name;
            try {
                const fileId = await saveFileInfo(file.name);
                currentFileId = fileId;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'csv') {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await processCSVData(ev.target.result, fileId, file.name);
                        await refreshFileList();
                        document.getElementById('fileSelector').value = fileId;
                        alert(`文件 "${file.name}" 导入成功！共 ${allWords.length} 个词汇`);
                    };
                    reader.readAsText(file, 'UTF-8');
                } else {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        await processExcelData(jsonData, fileId, file.name);
                        await refreshFileList();
                        document.getElementById('fileSelector').value = fileId;
                        alert(`文件 "${file.name}" 导入成功！共 ${allWords.length} 个词汇`);
                    };
                    reader.readAsArrayBuffer(file);
                }
            } catch (err) { alert('文件导入失败：' + err.message); }
            this.value = '';
        });

        // ==================== 启动加载 ====================
        window.onload = async function() {
            try {
                if (!window.indexedDB) alert('浏览器不支持IndexedDB，请使用Chrome、Edge或Firefox');
                if (window.indexedDB) {
                    await initIndexedDB();
                    // 迁移旧数据（略）
                }
                const savedWordsPerPage = localStorage.getItem('defaultWordsPerPage');
                if (savedWordsPerPage) {
                    document.getElementById('defaultWordsPerPage').value = savedWordsPerPage;
                    document.getElementById('wordsPerPage').value = savedWordsPerPage;
                    document.getElementById('reviewWordsPerPage').value = savedWordsPerPage;
                    wordsPerPage = parseInt(savedWordsPerPage) || 10;
                    reviewWordsPerPage = parseInt(savedWordsPerPage) || 10;
                }
                const savedAuto = localStorage.getItem('autoScrollToFirst');
                if (savedAuto !== null) {
                    autoScrollToFirst = savedAuto === 'true';
                    document.getElementById('autoScrollToFirst').checked = autoScrollToFirst;
                }
                const savedSwipe = localStorage.getItem('enableSwipe');
                if (savedSwipe !== null) {
                    enableSwipe = savedSwipe === 'true';
                    document.getElementById('enableSwipe').checked = enableSwipe;
                }
                initTouchEvents();
                if (window.indexedDB && db) {
                    await refreshFileList();
                    const hasData = await loadWordsFromStorage();
                    if (!hasData) { allWords = []; wordStatus = {}; updateDisplay(); updateStats(); }
                } else {
                    allWords = []; wordStatus = {}; updateDisplay(); updateStats();
                }
                updateUserUI(auth.currentUser);
            } catch (err) {
                console.error(err);
                allWords = []; wordStatus = {}; updateDisplay(); updateStats();
            }
        };

        async function loadWordsFromStorage() {
            fileList = await getFileList();
            if (fileList.length > 0) {
                const first = fileList[0];
                currentFileId = first.id;
                const data = await loadVocabularyFromFile(currentFileId);
                allWords = data.words; wordStatus = data.status;
                shownAnswers.clear();
                if (allWords.length > 0) {
                    currentPage = 1; currentReviewPage = 1;
                    updateDisplay(); updateStats(); await refreshFileList();
                    return true;
                }
            }
            return false;
        }
    </script>
</body>
</html>
